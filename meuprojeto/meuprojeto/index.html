<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Linktree</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container text-center">

    <img src="./profile.png" alt="Foto" class="avatar">

    <h1 class="title">Vitória Cristina</h1>
    <p class="subtitle">Top 3 meus mangás favoritos 🎌📚</p>

    <div class="links">

      <a 
        href="https://lista.mercadolivre.com.br/colecao-jujutsu-kaisen-manga" 
        class="btn btn-primary" 
        target="_blank"
      >
        Jujutsu Kaisen
      </a>

      <a 
        href="https://lista.mercadolivre.com.br/colecao-evangelion-manga" 
        class="btn btn-secondary" 
        target="_blank"
      >
        Evangelion
      </a>

      <a 
        href="https://lista.mercadolivre.com.br/diarios-de-uma-apotecaria-manga" 
        class="btn btn-dark" 
        target="_blank"
      >
        Diário de uma Apotecária
      </a>

    </div>

    <button class="btn btn-outline" onclick="toggleTheme()">
      Alternar Tema
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
